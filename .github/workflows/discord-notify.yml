name: Discord Notifications

on:
  workflow_call:
    inputs:
      status:
        description: 'Status of the workflow (success, failure, cancelled)'
        required: true
        type: string
      title:
        description: 'Title for the notification'
        required: true
        type: string
      description:
        description: 'Description for the notification'
        required: false
        type: string
        default: ''
      url:
        description: 'URL to link to'
        required: false
        type: string
        default: ''
    secrets:
      DISCORD_WEBHOOK:
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Notification
        uses: sarisia/actions-status-discord@v1.16.0
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ inputs.status }}
          title: ${{ inputs.title }}
          description: ${{ inputs.description }}
          image: ${{ inputs.status == 'success' && format('https://raw.githubusercontent.com/{0}/main/assets/img/GitHub_Invertocat_Green.png', github.repository) || format('https://raw.githubusercontent.com/{0}/main/assets/img/GitHub_Invertocat_Red.png', github.repository) }}
          url: ${{ inputs.url || format('{0}/{1}/actions/runs/{2}', github.server_url, github.repository, github.run_id) }}
          username: GitHub Actions
          avatar_url: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png
